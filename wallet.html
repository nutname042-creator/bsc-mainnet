<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wallet</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#24272a;
  --surface:#141618;
  --surface2:#1b1d1f;
  --border:#3b3d42;
  --text:#ffffff;
  --muted:#858585;
  --muted2:#9b9b9b;
  --accent:#0376c9;
  --accent2:#1ebc8d;
  --red:#d73847;
  --bnb:#f0b90b;
  --usdt:#26a17b;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Nunito Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* NOISE OVERLAY */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:0;
  opacity:.4;
}

.app{position:relative;z-index:1;max-width:420px;margin:0 auto;padding:0 0 80px;overflow:visible}

/* HEADER */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:env(safe-area-inset-top,16px) 20px 12px;padding-top:max(env(safe-area-inset-top),16px);
}
.logo{font-size:13px;font-weight:700;letter-spacing:.15em;color:var(--muted2);text-transform:uppercase}
.connect-btn{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-family:'Nunito Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;font-weight:600;
  padding:8px 16px;border-radius:100px;cursor:pointer;
  transition:all .2s;letter-spacing:.02em;
}
.connect-btn:hover{border-color:var(--accent);color:var(--accent)}
.connect-btn.connected{border-color:var(--accent2);color:var(--accent2)}

/* WALLET ADDRESS */
.wallet-addr{
  display:flex;align-items:center;gap:8px;
  padding:0 20px 20px;
  font-family:'Roboto Mono',monospace;
  font-size:12px;color:var(--muted2);
}
.addr-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* BALANCE CARDS */
.balances{padding:0 16px 8px;display:flex;flex-direction:column;gap:8px}

.balance-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:20px;
  position:relative;
  overflow:hidden;
  transition:border-color .2s;
}
.balance-card:hover{border-color:#333}
.balance-card::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:120px;height:120px;border-radius:50%;
  opacity:.06;
}
.balance-card.bnb-card::before{background:var(--bnb)}
.balance-card.usdt-card::before{background:var(--usdt)}

.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.token-label{display:flex;align-items:center;gap:10px}
.token-dot{
  width:40px;height:40px;border-radius:50%;
  flex-shrink:0;position:relative;
}
.token-dot .main-logo{width:40px;height:40px;border-radius:50%;object-fit:cover;display:block;}
.token-dot .chain-badge{
  position:absolute;bottom:-2px;right:-2px;
  width:16px;height:16px;border-radius:50%;
  border:2px solid var(--surface);
  overflow:hidden;background:#000;
}
.token-dot .chain-badge img{width:100%;height:100%;object-fit:cover;}
.token-name{font-size:14px;font-weight:600;color:var(--muted2)}
.token-change{font-size:12px;font-family:'Roboto Mono',monospace;color:var(--muted)}

.balance-amount{
  font-size:clamp(22px,5.5vw,28px);font-weight:700;letter-spacing:-.02em;line-height:1;
  font-variant-numeric:tabular-nums;
}
.balance-usd{
  font-size:13px;color:var(--muted2);margin-top:6px;
  font-family:'Roboto Mono',monospace;
}

/* TOTAL BALANCE */
.total-section{padding:16px 20px 8px}
.total-label{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:4px}
.total-amount{font-size:clamp(22px,6vw,32px);font-weight:700;letter-spacing:-.02em;line-height:1}
.total-amount span{color:#ffffff}

/* TABS */
.tabs{display:flex;gap:4px;padding:16px 16px 0;border-bottom:1px solid var(--border);margin-bottom:0}
.tab{
  flex:1;text-align:center;padding:10px;
  font-size:13px;font-weight:600;letter-spacing:.03em;
  color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;
  transition:all .2s;margin-bottom:-1px;
}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* TRANSFER FORM */
.transfer-section{padding:20px 16px;display:none}
.transfer-section.active{display:block}

.form-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.form-group{margin-bottom:16px}

.input-wrap{position:relative}
.form-input{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;
  color:var(--text);font-family:'Roboto Mono',monospace;font-size:14px;
  outline:none;transition:border-color .2s;
}
.form-input:focus{border-color:#444}
.form-input::placeholder{color:var(--muted)}

.token-select{
  display:flex;gap:8px;margin-bottom:16px;
}
.token-opt{
  flex:1;padding:12px;border-radius:12px;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;text-align:center;
  font-size:13px;font-weight:700;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.token-opt.selected.bnb{border-color:var(--bnb);background:rgba(240,185,11,.08);color:var(--bnb)}
.token-opt.selected.usdt{border-color:var(--usdt);background:rgba(38,161,123,.08);color:var(--usdt)}
.token-opt:not(.selected){color:var(--muted2)}

.amount-wrap{position:relative}
.max-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:var(--surface2);border:none;color:var(--accent);
  font-family:'Nunito Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:12px;font-weight:700;
  padding:4px 10px;border-radius:6px;cursor:pointer;letter-spacing:.05em;
}

.send-btn{
  width:100%;padding:16px;border-radius:14px;border:none;
  background:var(--accent);color:#fff;
  font-family:'Nunito Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:16px;font-weight:800;
  cursor:pointer;transition:all .2s;letter-spacing:.02em;
}
.send-btn:hover{background:#025fa5}
.send-btn:disabled{background:var(--surface2);color:var(--muted);cursor:default}

/* HISTORY */
.history-section{padding:16px;display:none}
.history-section.active{display:block}

.tx-item{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;border-radius:16px;
  background:var(--surface);border:1px solid var(--border);
  margin-bottom:8px;transition:border-color .2s;
}
.tx-item:hover{border-color:#333}

.tx-icon{
  width:40px;height:40px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:16px;
}
.tx-icon.out{background:rgba(255,59,59,.1)}
.tx-icon.in{background:rgba(0,255,136,.1)}

.tx-info{flex:1;min-width:0}
.tx-type{font-size:14px;font-weight:600;margin-bottom:2px}
.tx-addr{
  font-size:11px;color:var(--muted2);
  font-family:'Roboto Mono',monospace;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.tx-amount{text-align:right;flex-shrink:0}
.tx-val{font-size:14px;font-weight:700;font-family:'Roboto Mono',monospace}
.tx-val.out{color:var(--red)}
.tx-val.in{color:var(--accent2)}
.tx-time{font-size:11px;color:var(--muted);margin-top:2px}

.empty-state{
  text-align:center;padding:48px 20px;color:var(--muted);
  font-size:14px;
}
.empty-state .emoji{font-size:32px;margin-bottom:12px}

/* TOAST */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--surface2);border:1px solid var(--border);
  border-radius:14px;padding:12px 20px;font-size:14px;font-weight:600;
  display:none;white-space:nowrap;z-index:999;
  animation:slideUp .3s ease;
}
.toast.show{display:block}
.toast.s{color:var(--accent2);border-color:rgba(0,255,136,.3)}
.toast.e{color:var(--red);border-color:rgba(255,59,59,.3)}
.toast.i{color:var(--accent);border-color:rgba(3,118,201,.3)}

@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

/* CONNECT OVERLAY */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;z-index:500;padding:32px;
}
.overlay-icon{font-size:48px;margin-bottom:8px}
.overlay h2{font-size:24px;font-weight:800;letter-spacing:-.02em;text-align:center}
.overlay p{color:var(--muted2);text-align:center;font-size:14px;line-height:1.6;max-width:280px}
.overlay-btn{
  background:var(--accent);color:#fff;border:none;
  border-radius:14px;padding:16px 40px;
  font-family:'Nunito Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:16px;font-weight:800;
  cursor:pointer;letter-spacing:.02em;transition:all .2s;margin-top:8px;
}
.overlay-btn:hover{background:#025fa5}

.loading-line{
  width:100%;height:2px;background:var(--surface2);border-radius:2px;overflow:hidden;
  margin-top:4px;
}
.loading-line::after{
  content:'';display:block;height:100%;width:40%;
  background:var(--accent);border-radius:2px;
  animation:shimmer 1.5s infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}

/* RESPONSIVE */
@media (min-width:480px){
  .app{padding:0 0 80px}
  .balance-amount{font-size:36px}
  .total-amount{font-size:48px}
}
@media (max-width:360px){
  .balance-amount{font-size:26px}
  .total-amount{font-size:34px}
  .header{padding:16px 14px 12px}
  .balances{padding:0 12px 8px}
  .tabs{padding:12px 12px 0}
  .transfer-section{padding:16px 12px}
  .history-section{padding:12px}
}
@media (min-width:768px){
  body{display:flex;align-items:flex-start;justify-content:center;padding:40px 20px}
  .app{
    width:420px;
    border:1px solid var(--border);
    border-radius:28px;
    overflow:hidden;
    margin:0;
  }
}

/* ACCOUNT PICKER */
.account-picker{
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:600;padding:0;
}
.picker-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:24px 24px 0 0;width:100%;max-width:420px;
  padding:24px 16px 40px;
  animation:slideUp .3s ease;
}
.picker-header{margin-bottom:20px;padding:0 4px}
.picker-title{font-size:18px;font-weight:700;margin-bottom:4px}
.picker-sub{font-size:13px;color:var(--muted2)}
.account-item{
  display:flex;align-items:center;gap:14px;
  padding:14px;border-radius:16px;cursor:pointer;
  transition:background .15s;margin-bottom:6px;
  border:1px solid transparent;
}
.account-item:hover{background:var(--surface2);border-color:var(--border)}
.account-avatar{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#025fa5);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:#fff;flex-shrink:0;
}
.account-info{flex:1;min-width:0}
.account-name{font-size:15px;font-weight:600;margin-bottom:2px}
.account-addr{font-size:12px;color:var(--muted2);font-family:'Roboto Mono',monospace}
.account-check{width:20px;height:20px;flex-shrink:0}

.swap-tab{color:var(--accent)!important;font-weight:700;}
.swap-tab-icon{font-size:14px}

.swap-tab{color:var(--accent) !important;font-weight:700;}
.swap-tab:hover{opacity:.8}

/* HEADER RIGHT */
.header-right{display:flex;align-items:center;gap:8px}

/* ACCOUNT SWITCHER */
.acct-switcher{
  display:flex;align-items:center;gap:6px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:100px;padding:5px 10px 5px 5px;
  cursor:pointer;transition:all .2s;
}
.acct-switcher:hover{border-color:var(--accent)}
.acct-avatar{
  width:24px;height:24px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#025fa5);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#fff;flex-shrink:0;
}
.acct-switcher-name{font-size:12px;font-weight:600;color:var(--text);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acct-chevron{width:14px;height:14px;color:var(--muted2);transition:transform .2s;flex-shrink:0}
.acct-chevron.open{transform:rotate(180deg)}

/* ACCOUNT DROPDOWN */
.acct-dropdown{
  position:absolute;top:64px;right:16px;left:16px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;z-index:200;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  animation:fadeIn .15s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.acct-dropdown-header{
  font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted2);padding:12px 16px 8px;
}
.acct-dd-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;cursor:pointer;transition:background .15s;
  border-top:1px solid var(--border);
}
.acct-dd-item:hover{background:var(--surface2)}
.acct-dd-item.active-acct{background:rgba(3,118,201,.08)}
.acct-dd-avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#025fa5);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#fff;flex-shrink:0;
}
.acct-dd-info{flex:1;min-width:0}
.acct-dd-name{font-size:14px;font-weight:600;margin-bottom:2px}
.acct-dd-addr{font-size:11px;color:var(--muted2);font-family:'Roboto Mono',monospace}
.acct-dd-check{color:var(--accent);font-size:16px;flex-shrink:0}

/* Backdrop */
.dropdown-backdrop{position:fixed;inset:0;z-index:199;}
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="overlay-icon">◈</div>
  <h2>Connect Wallet</h2>
  <p>Connect your MetaMask wallet to view balances and send tokens.</p>
  <button class="overlay-btn" onclick="connectWallet()">Connect MetaMask</button>
</div>

<div class="app">
  <div class="header">
    <div class="logo">BSC Wallet</div>
    <button class="connect-btn" id="connectBtn" onclick="connectWallet()">Connect</button>
  </div>

  <div class="wallet-addr" id="walletAddr" style="display:none">
    <div class="addr-dot"></div>
    <span id="addrText"></span>
  </div>

  <!-- TOTAL -->
  <div class="total-section">
    <div class="total-label">Total Balance</div>
    <div class="total-amount" id="totalBalance">$<span>0.00</span></div>
  </div>

  <!-- BALANCE CARDS -->
  <div class="balances">
    <div class="balance-card bnb-card">
      <div class="card-top">
        <div class="token-label">
          <div class="token-dot">
              <img class="main-logo" src="https://assets.coingecko.com/coins/images/825/small/bnb-icon2_2x.png" alt="BNB"/>
              <div class="chain-badge"><img src="https://assets.coingecko.com/coins/images/825/small/bnb-icon2_2x.png" alt="BSC"/></div>
            </div>
          <div class="token-name">BNB</div>
        </div>
        <div class="token-change" id="bnbUsd">$0.00</div>
      </div>
      <div class="balance-amount" id="bnbBal">—</div>
      <div class="balance-usd" id="bnbFiat">Fetching...</div>
      <div class="loading-line" id="bnbLoader"></div>
    </div>

    <div class="balance-card usdt-card">
      <div class="card-top">
        <div class="token-label">
          <div class="token-dot">
              <img class="main-logo" src="https://assets.coingecko.com/coins/images/325/small/Tether.png" alt="USDT"/>
              <div class="chain-badge"><img src="https://assets.coingecko.com/coins/images/825/small/bnb-icon2_2x.png" alt="BSC"/></div>
            </div>
          <div class="token-name">Tether USD</div>
        </div>
        <div class="token-change" id="usdtRate">≈ $1.00</div>
      </div>
      <div class="balance-amount" id="usdtBal">—</div>
      <div class="balance-usd" id="usdtFiat">Fetching...</div>
      <div class="loading-line" id="usdtLoader"></div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('transfer')">Send</div>
    <div class="tab" onclick="switchTab('history')">History</div>
    <div class="tab swap-tab" onclick="goToSwap()">
      <span class="swap-tab-icon">⇄</span> Swap
    </div>
  </div>

  <!-- TRANSFER -->
  <div class="transfer-section active" id="transferTab">
    <div class="form-group">
      <div class="form-label">Select Token</div>
      <div class="token-select">
        <div class="token-opt bnb selected" id="optBNB" onclick="selectToken('BNB')">
          <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/smartchain/info/logo.png" style="width:20px;height:20px;border-radius:50%"/> BNB
        </div>
        <div class="token-opt usdt" id="optUSDT" onclick="selectToken('USDT')">
          <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/smartchain/assets/0x55d398326f99059fF775485246999027B3197955/logo.png" style="width:20px;height:20px;border-radius:50%"/> USDT
        </div>
      </div>
    </div>

    <div class="form-group">
      <div class="form-label">Recipient Address</div>
      <input class="form-input" id="toAddr" placeholder="0x..." autocomplete="off" spellcheck="false" style="-webkit-user-select:text;user-select:text;"/>
    </div>

    <div class="form-group">
      <div class="form-label">Amount</div>
      <div class="amount-wrap">
        <input class="form-input" id="sendAmt" placeholder="0.00" type="number" step="any"/>
        <button class="max-btn" onclick="setMax()">MAX</button>
      </div>
    </div>

    <button class="send-btn" id="sendBtn" onclick="doSend()">Send</button>
  </div>

  <!-- HISTORY -->
  <div class="history-section" id="historyTab">
    <div id="historyList"><div class="empty-state"><div class="emoji">📭</div>No transactions yet</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const RPC = 'https://bsc-simulation-production.up.railway.app';
const USDT_ADDR = '0x55d398326f99059fF775485246999027B3197955';
const USDT_ABI = ['function balanceOf(address) view returns (uint256)','function transfer(address,uint256) returns (bool)'];
const BNB_PRICE = 500;

let signer, account;
let bnbBal = 0n, usdtBal = 0n;
let selectedToken = 'BNB';
let txHistory = [];

function showToast(msg, type='i') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3500);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='transfer')||(i===1&&tab==='history')||(i===2&&tab==='swap')));
  document.getElementById('transferTab').classList.toggle('active', tab==='transfer');
  document.getElementById('historyTab').classList.toggle('active', tab==='history');
  if(tab==='history') renderHistory();
  if(tab==='swap') goToSwap();
}

function selectToken(t) {
  selectedToken = t;
  document.getElementById('optBNB').className = 'token-opt bnb' + (t==='BNB'?' selected':'');
  document.getElementById('optUSDT').className = 'token-opt usdt' + (t==='USDT'?' selected':'');
}

function setMax() {
  if(!account) return;
  if(selectedToken==='BNB') {
    const max = Math.max(0, parseFloat(ethers.formatEther(bnbBal)) - 0.005);
    document.getElementById('sendAmt').value = max.toFixed(6);
  } else {
    document.getElementById('sendAmt').value = parseFloat(ethers.formatUnits(usdtBal, 18)).toFixed(2);
  }
}

async function refreshBalances() {
  if(!account) return;
  try {
    const rpc = new ethers.JsonRpcProvider(RPC);
    bnbBal = await rpc.getBalance(account);
    const bnbNum = parseFloat(ethers.formatEther(bnbBal));
    document.getElementById('bnbBal').textContent = bnbNum.toLocaleString('en', {maximumFractionDigits:4});
    document.getElementById('bnbFiat').textContent = '≈ $' + (bnbNum * BNB_PRICE).toLocaleString('en', {maximumFractionDigits:2}) + ' USD';
    document.getElementById('bnbUsd').textContent = '$' + BNB_PRICE + '/BNB';

    const usdt = new ethers.Contract(USDT_ADDR, USDT_ABI, rpc);
    usdtBal = await usdt.balanceOf(account);
    const usdtNum = parseFloat(ethers.formatUnits(usdtBal, 18));
    document.getElementById('usdtBal').textContent = usdtNum.toLocaleString('en', {maximumFractionDigits:2});
    document.getElementById('usdtFiat').textContent = '≈ $' + usdtNum.toLocaleString('en', {maximumFractionDigits:2}) + ' USD';

    const total = (bnbNum * BNB_PRICE) + usdtNum;
    document.getElementById('totalBalance').innerHTML = '$<span>' + total.toLocaleString('en', {maximumFractionDigits:2}) + '</span>';
    hideLoader();
  } catch(e) { console.error('Balance error:', e); }
}

function hideLoader() {
  document.getElementById('bnbLoader').style.display = 'none';
  document.getElementById('usdtLoader').style.display = 'none';
}

async function doSend() {
  if(!account) { showToast('Connect wallet first', 'e'); return; }
  const to = document.getElementById('toAddr').value.trim();
  const amt = document.getElementById('sendAmt').value.trim();
  if(!ethers.isAddress(to)) { showToast('Invalid address', 'e'); return; }
  if(!amt || parseFloat(amt) <= 0) { showToast('Enter amount', 'e'); return; }

  const btn = document.getElementById('sendBtn');
  btn.disabled = true; btn.textContent = 'Confirm in wallet...';

  try {
    // Get gas price from our RPC, not MetaMask
    const rpc = new ethers.JsonRpcProvider(RPC);
    const feeData = await rpc.getFeeData();
    const gasPrice = feeData.gasPrice;

    let tx;
    if(selectedToken === 'BNB') {
      tx = await signer.sendTransaction({
        to,
        value: ethers.parseEther(amt),
        gasLimit: 21000,
        gasPrice: gasPrice,
      });
    } else {
      const usdt = new ethers.Contract(USDT_ADDR, USDT_ABI, signer);
      tx = await usdt.transfer(to, ethers.parseUnits(amt, 18), {
        gasLimit: 200000,
        gasPrice: gasPrice,
      });
    }

    btn.textContent = 'Sending...';
    showToast('Transaction sent...', 'i');
    await tx.wait();

    txHistory.unshift({
      token: selectedToken, amount: amt, to,
      hash: tx.hash, time: new Date().toLocaleTimeString()
    });

    showToast('✓ Sent successfully!', 's');
    btn.textContent = '✓ Done!';
    document.getElementById('toAddr').value = '';
    document.getElementById('sendAmt').value = '';
    await refreshBalances();
    setTimeout(() => { btn.disabled=false; btn.textContent='Send'; }, 2000);
  } catch(e) {
    console.error(e);
    showToast('✗ ' + (e.shortMessage || e.reason || e.message || 'Failed'), 'e');
    btn.disabled=false; btn.textContent='Send';
  }
}

function renderHistory() {
  const el = document.getElementById('historyList');
  if(!txHistory.length) {
    el.innerHTML = '<div class="empty-state"><div class="emoji">📭</div>No transactions yet</div>';
    return;
  }
  el.innerHTML = txHistory.map(tx => `
    <div class="tx-item">
      <div class="tx-icon out">
        <img src="${tx.token==='BNB'?'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/smartchain/info/logo.png':'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/smartchain/assets/0x55d398326f99059fF775485246999027B3197955/logo.png'}" style="width:22px;height:22px;border-radius:50%"/>
      </div>
      <div class="tx-info">
        <div class="tx-type">Sent ${tx.token}</div>
        <div class="tx-addr">To: ${tx.to}</div>
      </div>
      <div class="tx-amount">
        <div class="tx-val out">-${parseFloat(tx.amount).toLocaleString('en',{maximumFractionDigits:6})}</div>
        <div class="tx-time">${tx.time}</div>
      </div>
    </div>
  `).join('');
}

async function connectWallet() {
  if(!window.ethereum) { showToast('Open in MetaMask browser', 'e'); return; }
  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    account = accounts[0];
    const provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();

    document.getElementById('overlay').style.display = 'none';
    document.getElementById('connectBtn').textContent = account.slice(0,6)+'...'+account.slice(-4);
    document.getElementById('connectBtn').className = 'connect-btn connected';
    document.getElementById('walletAddr').style.display = 'flex';
    document.getElementById('addrText').textContent = account.slice(0,10)+'...'+account.slice(-8);

    await refreshBalances();
    clearInterval(window._balTimer);
    window._balTimer = setInterval(refreshBalances, 10000);

    window.ethereum.on('accountsChanged', async a => {
      account = a[0];
      const p2 = new ethers.BrowserProvider(window.ethereum);
      signer = await p2.getSigner();
      document.getElementById('connectBtn').textContent = account.slice(0,6)+'...'+account.slice(-4);
      document.getElementById('addrText').textContent = account.slice(0,10)+'...'+account.slice(-8);
      await refreshBalances();
    });
    window.ethereum.on('chainChanged', () => location.reload());
  } catch(e) {
    showToast('Connection failed: ' + (e.message||''), 'e');
  }
}

function goToSwap() { window.location.href = 'swap.html'; }

const s = document.createElement('script');
s.src = 'https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js';
s.onload = () => { if(window.ethereum) connectWallet(); };
document.head.appendChild(s);
</script>
